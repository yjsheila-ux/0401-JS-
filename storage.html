    <input type="text" id="name" placeholder="이름 입력..." autocomplete="off">
    <button id="save">저장</button>
    <button id="reset">리셋</button>
    <p id="result"></p>

    <script>
        // 한번 이름을 저장하면, 브라우저를 닫았다가 열어도 이름이 유지되게 하기
        const input = document.querySelector("#name");
        const button = document.querySelector("#save");
        const reset = document.querySelector("#reset");
        const result = document.querySelector("#result");

        // DOM 그릴 때, 로컬 스토리를 읽어서 저장된 이름이 있으면 출력
        const savedUser = localStorage.getItem("name");
        if (savedUser) {
            result.textContent = savedUser;
        };

        // input 값을 p태그에 
        button.addEventListener("cilck", () => {
            // 캐싱(caching) = 임시 저장소에 데이터를 저장하는 기술
            localStorage.setItem("name", input.value);
            result.textContent = input.value;
        });

        // 리셋 버튼을 누르면, 이름 리셋

        // const reset = document.querySelector("#reset");
        // button.addEventListener("click", () => {
            // result

        // })

        reset.addEventListener("click", () => {
            localStorage.removeItem("name");
            result.textContent = "";
        })

    </script>
</body>
