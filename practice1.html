<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1 class="text">hello</h1>
    <button id="change">변경</button>

    <script>
        /* 변경 버튼을 눌렀을 때,
            1) h1 태그의 텍스트 -> "Hello, js" 변경
            2) h2 태그의 색상 -> red 로 변경
        */
        const h1 = document.querySelector(".text");
        const button = document.querySelector("#change");
        
        // flag 변수
        let isChanged = false;

        function changeH1() {
            if(!isChanged) {
                h1.textContent = "hello, JS";
                h1.style.color = "red";
            } else {
            h1.textContent = "hello";
            h1.style.color = "black";
            }
            isChanged = !isChanged;
        };
        // button.addEventListener("click", changeH1()); //이벤트리스너를 지정해주는 과정에서 함수 호출
        button.addEventListener("click", changeH1);      // changeH1() 으로 하면 언디파인드 호출
    </script>

</body>

</html>
